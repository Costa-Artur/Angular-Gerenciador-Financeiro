<mat-card class="card">
  <div class="card__main-info">
    <div class="card__title">
      {{ transaction().title }}
    </div>
    <div class="card__value">
      <app-transaction-value [transaction]="transaction()"/>
    </div>
  </div>

  <div class="card__actions">
    <button matButton="filled" (click)="remove.emit(transaction())">Remover</button>
    <button matButton="filled" (click)="edit.emit(transaction())">Editar</button>
  </div>
</mat-card>
